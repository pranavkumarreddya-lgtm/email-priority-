<!DOCTYPE html>
<html>

<head>
<title>Email Priority Predictor</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.container{
background:white;
padding:30px;
border-radius:12px;
width:350px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
margin-bottom:20px;
}

textarea{
width:100%;
height:120px;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
resize:none;
font-size:14px;
}

button{
margin-top:15px;
width:100%;
padding:10px;
background:#667eea;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#5563d1;
}

#result{
margin-top:20px;
font-size:18px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h2>Email Priority Classifier</h2>

<textarea id="email" placeholder="Paste your email text here..."></textarea>

<button onclick="predict()">Predict Priority</button>

<div id="result"></div>

</div>

<script>

function predict(){

let email=document.getElementById("email").value;

if(email===""){
document.getElementById("result").innerHTML="Please enter email text";
return;
}

document.getElementById("result").innerHTML="Predicting...";

}

</script>

</body>
</html>
